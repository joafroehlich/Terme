<pre><b><p class ="Aufgabe">Terme Aufgabe 35

Berechnen Sie:

(x + y)[(x + y)(x - 2y) - (x + 2y)(x - y)] 

= (x + y)[(x<sup>2</sup> - 2xy + xy – 2y<sup>2</sup>) – 

- (x<sup>2</sup> - xy + 2xy – 2y<sup>2</sup>)] 

= (x + y)[x<sup>2</sup> - xy – 2y<sup>2</sup> - (x<sup>2</sup> + xy – 2y<sup>2</sup>)] 

= (x + y)[x<sup>2</sup> - xy – 2y<sup>2</sup> - x<sup>2</sup> - xy + 2y<sup>2</sup>] 

= (x + y)[- 2xy] 

= <span style="color:red;">- 2x<sup>2</sup>y - 2xy<sup>2</sup></span>
 </p></b></pre>
