<pre><b><p class ="Aufgabe">Terme Aufgabe 34

Berechnen Sie:

(a + b)(2a - 3b) - (3a + 2b)(a - b) 

= (2a<sup>2</sup> - 3ab + 2ab - 3b<sup>2</sup>)–(3a<sup>2</sup> - 3ab + 2ab - 2b<sup>2</sup>)

= 2a<sup>2</sup> - ab – 3b<sup>2</sup> - (3a<sup>2</sup> - ab – 2b<sup>2</sup>) 

= 2a<sup>2</sup> - ab – 3b<sup>2</sup> - 3a<sup>2</sup> + ab + 2b<sup>2</sup> 

= <span style="color:red;">- a<sup>2</sup> - b<sup>2</sup></span>
 </p></b></pre>
