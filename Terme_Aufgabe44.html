<pre><b><p class ="Aufgabe">Terme Aufgabe 44

Berechnen Sie:

9w<sup>2</sup> - 480w 

Vergleich mit (a + b)<sup>2</sup> = a<sup>2</sup> + 2ab + b<sup>2</sup> 
                        9w<sup>2</sup> - 480w 

a<sup>2</sup> entspricht 9w<sup>2</sup> ---> a entspricht 3w  

2*3*b entsprechen - 480 ---> b = - 80  

b<sup>2</sup> = 6400 

9w<sup>2</sup> - 480w + <span style="color:red;">6400</span> = (3w - 80)<sup>2</sup> 
 </p></b></pre>
