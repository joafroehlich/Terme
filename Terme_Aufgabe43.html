<pre><b><p class ="Aufgabe">Terme Aufgabe 43

Berechnen Sie:

9a<sup>2</sup> + 64 
 
Vergleich mit (a + b)<sup>2</sup> = a<sup>2</sup> + 2ab + b<sup>2</sup> 
                        9a<sup>2</sup>       + 64 
  
a<sup>2</sup> entspricht 9a<sup>2</sup> --> a entspricht 3a  
 
b<sup>2</sup> entspricht 64 --> b = 8  
 
2ab = 2*3a*8 = 48a 
 
9a<sup>2</sup> + <span style="color:red;">48a</span> + 64 = (3a + 8)<sup>2</sup>  
 </p></b></pre>
